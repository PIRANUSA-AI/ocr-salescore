# SalesCore — Nginx reverse proxy config for VPS deployment.
# Place at /etc/nginx/sites-available/salescore
# Then: sudo ln -s /etc/nginx/sites-available/salescore /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

upstream salescore_frontend {
    server 127.0.0.1:9003;
}

upstream salescore_backend {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name your-domain.com;  # REPLACE with your actual domain or IP

    # ─── Backend API ──────────────────────────────────────
    location /api/v1/ {
        proxy_pass http://salescore_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Allow large payloads for OCR images (15 MB)
        client_max_body_size 16m;
    }

    # ─── Frontend (Next.js) ───────────────────────────────
    location / {
        proxy_pass http://salescore_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Static assets cache ──────────────────────────────
    location /_next/static {
        proxy_pass http://salescore_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Security headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
